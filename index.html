<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>母亲节快乐</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            user-select: none;
        }

        /* 文字卡片 */
        .card {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 44px 32px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            max-width: 420px;
            width: 85%;
            z-index: 10;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .title {
            font-size: 2.4rem;
            font-weight: 700;
            color: #d63384;
            margin-bottom: 12px;
            min-height: 64px;
            text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.6);
            line-height: 1.4;
        }

        .message {
            font-size: 1.25rem;
            color: #4a154b;
            line-height: 2;
            margin: 16px 0 4px;
            font-weight: 400;
            letter-spacing: 1px;
        }

        .hint {
            color: #a4508b;
            font-size: 0.9rem;
            margin-top: 28px;
            opacity: 0.75;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 0.9; }
        }

        /* 飘落爱心 */
        .heart {
            position: absolute;
            top: -10%;
            color: #ff4d6d;
            font-size: 22px;
            animation: fall linear infinite;
            pointer-events: none;
            z-index: 5;
            opacity: 0.9;
        }

        @keyframes fall {
            to {
                transform: translateY(110vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* 点击爱心动画 */
        .click-heart {
            position: absolute;
            pointer-events: none;
            font-size: 55px;
            animation: clickPop 1.2s ease-out forwards;
            z-index: 20;
            color: #ff1a4c;
            filter: drop-shadow(0 4px 6px rgba(255,0,100,0.4));
        }

        @keyframes clickPop {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(0.3) rotate(0deg);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -220%) scale(1.6) rotate(35deg);
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="title" id="typingTitle"></div>
        <div class="message">
            谢谢你做我的超级英雄<br>
            愿岁月对你温柔以待<br>
            永远美丽，永远快乐 🌷
        </div>
        <div class="hint">✧ 点一下屏幕，有惊喜 ✧</div>
    </div>

    <script>
        // 1. 打字机效果
        const text = "母亲节快乐";
        const titleEl = document.getElementById("typingTitle");
        let i = 0;
        function typeWriter() {
            if (i < text.length) {
                titleEl.textContent += text.charAt(i);
                i++;
                setTimeout(typeWriter, 130);
            } else {
                // 打完字后闪烁光标效果（可选）
                titleEl.style.borderRight = "2px solid #d63384";
            }
        }
        typeWriter();

        // 2. 持续飘落爱心
        function createFallingHeart() {
            const heart = document.createElement("div");
            heart.classList.add("heart");
            heart.innerHTML = "❤️";
            heart.style.left = Math.random() * 100 + "%";
            heart.style.animationDuration = Math.random() * 4 + 5 + "s"; // 5-9秒
            heart.style.fontSize = Math.random() * 18 + 14 + "px";
            document.body.appendChild(heart);

            heart.addEventListener("animationend", () => {
                heart.remove();
            });
        }
        setInterval(createFallingHeart, 280);

        // 3. 点击冒大爱心
        document.body.addEventListener("click", function(e) {
            const clickHeart = document.createElement("div");
            clickHeart.classList.add("click-heart");
            clickHeart.innerHTML = "❤️";
            clickHeart.style.left = e.clientX + "px";
            clickHeart.style.top = e.clientY + "px";
            document.body.appendChild(clickHeart);

            clickHeart.addEventListener("animationend", () => {
                clickHeart.remove();
            });
        });
    </script>
</body>
</html>
